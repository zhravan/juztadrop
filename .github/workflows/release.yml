name: Release (main)

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  BUN_VERSION: "1.2"
  REGISTRY: ghcr.io

jobs:
  version-bump-check:
    name: Version bump check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version bump when app dirs change
        run: |
          chmod +x scripts/version-bump-check.sh
          ./scripts/version-bump-check.sh HEAD~1 HEAD

  build:
    name: Build all
    runs-on: ubuntu-latest
    needs: [version-bump-check]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install and build api
        run: |
          cd api && bun install --frozen-lockfile && bun run typecheck && bun run build

      - name: Install and build view
        run: |
          cd view && bun install --frozen-lockfile && bun run typecheck && bun run build

      - name: Install and build dashboard
        run: |
          cd dashboard && bun install --frozen-lockfile && bun run typecheck && bun run build

  docker-api:
    name: Docker api
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version
        id: ver
        run: echo "VERSION=$(jq -r .version package.json)" >> $GITHUB_OUTPUT

      - name: Build and push api image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/api:${{ steps.ver.outputs.VERSION }}
            ${{ env.REGISTRY }}/${{ github.repository }}/api:latest

  docker-view:
    name: Docker view
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version
        id: ver
        run: echo "VERSION=$(jq -r .version package.json)" >> $GITHUB_OUTPUT

      - name: Build and push view image
        uses: docker/build-push-action@v6
        with:
          context: ./view
          file: ./view/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/view:${{ steps.ver.outputs.VERSION }}
            ${{ env.REGISTRY }}/${{ github.repository }}/view:latest

  docker-dashboard:
    name: Docker dashboard
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version
        id: ver
        run: echo "VERSION=$(jq -r .version package.json)" >> $GITHUB_OUTPUT

      - name: Build and push dashboard image
        uses: docker/build-push-action@v6
        with:
          context: ./dashboard
          file: ./dashboard/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/dashboard:${{ steps.ver.outputs.VERSION }}
            ${{ env.REGISTRY }}/${{ github.repository }}/dashboard:latest

  changelog-and-release:
    name: Changelog and Release
    runs-on: ubuntu-latest
    needs: [docker-api, docker-view, docker-dashboard]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: ver
        run: echo "VERSION=$(jq -r .version package.json)" >> $GITHUB_OUTPUT

      - name: Get previous tag
        id: prev
        run: |
          PREV=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "tag=${PREV}" >> $GITHUB_OUTPUT

      - name: Generate changelog body
        id: changelog
        run: |
          if [[ -z "${{ steps.prev.outputs.tag }}" ]]; then
            BODY="Initial release."
          else
            BODY=$(git log "${{ steps.prev.outputs.tag }}..HEAD" --pretty=format:"* %s (%h)" --no-merges || echo "No commits.")
          fi
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Prepend to CHANGELOG.md
        env:
          CHANGELOG_BODY: ${{ steps.changelog.outputs.body }}
        run: |
          VERSION="${{ steps.ver.outputs.VERSION }}"
          PREV="${{ steps.prev.outputs.tag }}"
          REPO="${{ github.server_url }}/${{ github.repository }}"
          if [[ -n "$PREV" ]]; then
            ENTRY="# [${VERSION}](${REPO}/compare/${PREV}...v${VERSION}) ($(date +%Y-%m-%d))"
          else
            ENTRY="# [${VERSION}](${REPO}/releases/tag/v${VERSION}) ($(date +%Y-%m-%d))"
          fi
          { echo "$ENTRY"; echo ""; echo "### Changes"; echo ""; echo "$CHANGELOG_BODY"; echo ""; echo "---"; echo ""; cat CHANGELOG.md; } > CHANGELOG.md.new
          mv CHANGELOG.md.new CHANGELOG.md

      - name: Commit and push CHANGELOG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --staged --quiet || git commit -m "chore: update CHANGELOG for v${{ steps.ver.outputs.VERSION }} [skip ci]"
          git push origin main || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.VERSION }}
          name: Release v${{ steps.ver.outputs.VERSION }}
          body: |
            ## Docker images (GHCR)
            - `ghcr.io/${{ github.repository }}/api:${{ steps.ver.outputs.VERSION }}` (and `:latest`)
            - `ghcr.io/${{ github.repository }}/view:${{ steps.ver.outputs.VERSION }}` (and `:latest`)
            - `ghcr.io/${{ github.repository }}/dashboard:${{ steps.ver.outputs.VERSION }}` (and `:latest`)
            ## Changelog
            ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: false
